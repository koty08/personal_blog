services:
  db:
    env_file:
      - .env.prod

  app:
    env_file:
      - .env.prod
    restart: always
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:stable-alpine
    restart: always
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
