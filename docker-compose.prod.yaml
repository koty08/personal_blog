services:
  db:
    env_file:
      - .env.prod

  app:
    image: ${APP_IMAGE}
    env_file:
      - .env.prod
    restart: always
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:stable-alpine
    restart: always
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"

  backup:
    image: offen/docker-volume-backup:v2
    restart: always
    env_file:
      - .env.backup
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * 0"
      BACKUP_FILENAME: "backup-%Y-%m-%dT%H-%M-%S.tar.gz"
      BACKUP_RETENTION_DAYS: "7"
      DROPBOX_REMOTE_PATH: "/backup/personal_blog"
    volumes:
      - personal_blog_db_data:/backup/personal_blog_db_data:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
