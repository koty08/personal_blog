version: "3.8"

services:
  app:
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    command: npm run start

  nginx:
    image: nginx:stable-alpine
    restart: always
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
